services:
  app:
    user: "${UID:-1000}:${GID:-1000}"
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pool-api-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    environment:
      HOME: /tmp
      XDG_CONFIG_HOME: /tmp/.config
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-pool_api}
      DB_USERNAME: ${DB_USERNAME:-pool}
      DB_PASSWORD: ${DB_PASSWORD:-pool}
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: pool-api-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: pool-api-mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-pool_api}
      MYSQL_USER: ${DB_USERNAME:-pool}
      MYSQL_PASSWORD: ${DB_PASSWORD:-pool}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  mysql_data:
